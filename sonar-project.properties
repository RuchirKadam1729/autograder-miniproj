# ── SonarQube project configuration ─────────────────────────────────────────
sonar.projectKey=exam-grader
sonar.projectName=AI Exam Grader
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src,app.py
sonar.tests=tests

# Python-specific settings
sonar.language=py
sonar.python.version=3.11

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — don't analyse third-party or auto-generated files
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/node_modules/**,**/migrations/**

# Quality gate (will use the default unless a custom gate is set on the server)
sonar.qualitygate.wait=true
